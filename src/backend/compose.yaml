services:
  
  # Databases
  postgres:
    image: postgres:latest
    container_name: bookmaker-postgres
    environment:
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/inits/postgres-init.sh:/docker-entrypoint-initdb.d/postgres-init.sh
    networks:
      - bookmaker-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongodb:
    image: mongo:latest
    container_name: bookmaker-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: $MONGO_USER
      MONGO_INITDB_ROOT_PASSWORD: $MONGO_PASSWORD
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./deploy/inits/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - bookmaker-net
    healthcheck:
      test: |
        mongosh --quiet --eval "db.adminCommand('ping')" -u "${MONGO_USER}" -p "${MONGO_PASSWORD}" --authenticationDatabase "admin"
      interval: 10s
      timeout: 15s
      start_period: 30s
      retries: 5
      
      #  redis:
      #    image: redis:latest
      #    container_name: redis
      #    ports:
      #      - "6379:6379"
      #    volumes:
      #      - redis_data:/data
      #    networks:
      #      - bookmaker-net
      #    healthcheck:
      #      test: [ "CMD", "redis-cli", "ping" ]
      #      interval: 10s
      #      timeout: 5s
      #      retries: 5
  
  # Kafka message broker
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: bookmaker-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - bookmaker-net
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka
    container_name: bookmaker-kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_SSL_ENABLED: "false"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_INIT_SCRIPT: "/etc/kafka/init.sh"
    volumes:
      - ./deploy/inits/kafka-init.sh:/etc/kafka/init.sh:ro
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    networks:
      - bookmaker-net
    command: >
      bash -c "
      echo 'Starting Kafka...' &&
      /etc/confluent/docker/run &
      sleep 10 &&
      /etc/kafka/init.sh &&
      tail -f /dev/null
      "
    healthcheck:
      test: [ "CMD", "kafka-topics", "--list", "--bootstrap-server", "kafka:9092" ]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: bookmaker-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: bookmaker
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - bookmaker-net
    depends_on:
      - kafka

  # Сервис ставок
  betting-service:
    container_name: bookmaker-betting-service
    build:
      context: .
      dockerfile: BettingService.API/Dockerfile
    ports:
      - "50001:50001" # HTTPS
      - "50011:50011" # HTTP
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zookeeper:
        condition: service_started
      user-grpc-service:
        condition: service_started
      sport-data-grpc-service:
        condition: service_started
    volumes:
      - ./deploy/certs/aspnetapp.crt:/app/Properties/aspnetapp.crt:ro
      - ./deploy/configs/betting-service/secrets.json:/app/Properties/secrets.json:ro
      - ./deploy/configs/nlog.config:/app/Properties/nlog.config:ro
      - ./deploy/certs/:/https/
    env_file:
      - .env
    environment:
      - CERT_PATH=./deploy/certs/aspnetapp.crt
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=$CERTIFICATE_PASSWORD
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTPS_PORTS=50001
      - ASPNETCORE_HTTP_PORTS=50011
      - ConnectionStrings__DbConnection=Server=postgres;Port=5432;Database=betting_service;Username=$POSTGRES_USER;Password=$POSTGRES_PASSWORD
      - ConnectionStrings__HangfireDbConnection=mongodb://$MONGO_USER:$MONGO_PASSWORD@mongodb:27017/betting_hangfire_db?authSource=admin
      - Kafka__BootstrapServers=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - Kafka__SecurityProtocol=Plaintext
      - Grpc__UserService=http://user-grpc-service:50023
      - Grpc__SportDataService=http://sport-data-grpc-service:50022
    networks:
      - bookmaker-net
  
  # Сервис спортивных данных
  sport-data-service:
    container_name: bookmaker-sport-data-service
    build:
      context: .
      dockerfile: SportDataService.Presentation/Dockerfile
    ports:
      - "50002:50002" # HTTPS
      - "50012:50012" # HTTP
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./deploy/configs/sport-data-service/secrets.json:/app/Properties/secrets.json:ro
      - ./deploy/configs/nlog.config:/app/Properties/nlog.config:ro
      - ./deploy/certs/:/https/
    env_file:
      - .env
    environment:
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=$CERTIFICATE_PASSWORD
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTPS_PORTS=50002
      - ASPNETCORE_HTTP_PORTS=50012
      - ConnectionStrings__DbConnection=mongodb://$MONGO_USER:$MONGO_PASSWORD@mongodb:27017/sport_data?authSource=admin
      - ConnectionStrings__HangfireDbConnection=mongodb://$MONGO_USER:$MONGO_PASSWORD@mongodb:27017/sport_data_hangfire_db?authSource=admin
    networks:
      - bookmaker-net
  
  # Grpc сервис спортивных данных
  sport-data-grpc-service:
    container_name: bookmaker-sport-data-grpc-service
    build:
      context: .
      dockerfile: SportDataService.GrpcService/Dockerfile
    ports:
      - "50022:50022" # HTTPS
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zookeeper:
        condition: service_started
    volumes:
      - ./deploy/configs/sport-data-grpc-service/secrets.json:/app/Properties/secrets.json:ro
      - ./deploy/configs/nlog.config:/app/Properties/nlog.config:ro
      - ./deploy/certs/:/https/
    env_file:
      - .env
    environment:
      - ASPNETCORE_URLS=https://+:50022
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=$CERTIFICATE_PASSWORD
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DbConnection=mongodb://$MONGO_USER:$MONGO_PASSWORD@mongodb:27017/sport_data?authSource=admin
    networks:
      - bookmaker-net
  
  # Сервис работы с пользователями 
  user-service:
    container_name: bookmaker-user-service
    build:
      context: .
      dockerfile: UserService.Presentation/Dockerfile
    ports:
      - "50003:50003" # HTTPS
      - "50013:50013" # HTTP
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./deploy/configs/user-service/secrets.json:/app/Properties/secrets.json:ro
      - ./deploy/configs/nlog.config:/app/Properties/nlog.config:ro
      - ./deploy/certs/:/https/
    env_file:
      - .env
    environment:
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=$CERTIFICATE_PASSWORD
      - ASPNETCORE_HTTPS_PORTS=50003
      - ASPNETCORE_HTTP_PORTS=50013
      - ConnectionStrings__DbConnection=Server=postgres;Port=5432;Database=user_service;Username=$POSTGRES_USER;Password=$POSTGRES_PASSWORD
    networks:
      - bookmaker-net
  
  # Grpc сервис работы с пользователями
  user-grpc-service:
    container_name: bookmaker-user-grpc-service
    build:
      context: .
      dockerfile: UserService.GrpcService/Dockerfile
    ports:
      - "50023:50023" # HTTPS
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zookeeper:
        condition: service_started
    volumes:
      - ./deploy/configs/user-grpc-service/secrets.json:/app/Properties/secrets.json:ro
      - ./deploy/configs/nlog.config:/app/Properties/nlog.config:ro
      - ./deploy/certs/:/https/
    env_file:
      - .env
    environment:
      - ASPNETCORE_URLS=https://+:50023
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=$CERTIFICATE_PASSWORD
      - ConnectionStrings__DbConnection=Server=postgres;Port=5432;Database=user_service;Username=$POSTGRES_USER;Password=$POSTGRES_PASSWORD
    networks:
      - bookmaker-net

volumes:
  postgres_data:
  mongodb_data:

networks:
  bookmaker-net:
    driver: bridge
